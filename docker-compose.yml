version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=your-super-secret-key-change-this
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=propixy
      - POSTGRES_USER=propixy
      - POSTGRES_PASSWORD=propixy_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
