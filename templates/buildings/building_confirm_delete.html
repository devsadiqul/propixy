{% extends 'dashboard_base.html' %}

{% block page_title %}Delete Building{% endblock %}

{% block dashboard_content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
        <div class="text-center">
            <div class="mx-auto w-16 h-16 bg-red-100 dark:bg-red-900/50 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">Delete Building?</h3>
            <p class="text-gray-500 dark:text-gray-400 mb-6">
                Are you sure you want to delete <strong class="text-gray-900 dark:text-white">"{{ building.name }}"</strong>? 
                This will also delete all associated units and cannot be undone.
            </p>
            
            <form method="post" class="flex items-center justify-center gap-4">
                {% csrf_token %}
                <a href="{% url 'building_list' %}" 
                   class="px-6 py-3 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    Cancel
                </a>
                <button type="submit" 
                        class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition">
                    Delete Building
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
