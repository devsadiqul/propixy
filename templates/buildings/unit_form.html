{% extends 'dashboard_base.html' %}

{% block page_title %}{{ title }}{% endblock %}

{% block dashboard_content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="building" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Building</label>
                <select name="building" id="building" required
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition">
                    <option value="">Select a building</option>
                    {% for choice in form.building.field.queryset %}
                    <option value="{{ choice.pk }}" {% if form.building.value|stringformat:'s' == choice.pk|stringformat:'s' %}selected{% endif %}>{{ choice.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="flat_number" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Flat Number</label>
                    <input type="text" name="flat_number" id="flat_number" required 
                           value="{{ form.flat_number.value|default:'' }}"
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                           placeholder="e.g., A-101">
                </div>
                
                <div>
                    <label for="floor" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Floor</label>
                    <input type="number" name="floor" id="floor" required min="1"
                           value="{{ form.floor.value|default:'1' }}"
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition">
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="monthly_rent" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Monthly Rent (৳)</label>
                    <input type="number" name="monthly_rent" id="monthly_rent" required min="0" step="0.01"
                           value="{{ form.monthly_rent.value|default:'0' }}"
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition">
                </div>
                
                <div>
                    <label for="status" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Status</label>
                    <select name="status" id="status" required
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition">
                        <option value="vacant" {% if form.status.value == 'vacant' %}selected{% endif %}>Vacant</option>
                        <option value="booked" {% if form.status.value == 'booked' %}selected{% endif %}>Booked</option>
                        <option value="occupied" {% if form.status.value == 'occupied' %}selected{% endif %}>Occupied</option>
                    </select>
                </div>
            </div>
            
            <div class="flex items-center gap-4 pt-4">
                <button type="submit" 
                        class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition">
                    {{ button_text }}
                </button>
                <a href="{% url 'unit_list' %}" 
                   class="px-6 py-3 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
