{% extends 'dashboard_base.html' %}

{% block title %}Password Changed - Propixy{% endblock %}

{% block page_title %}Password Changed{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 text-center">
        <div class="w-16 h-16 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">Password Updated!</h2>
        <p class="text-gray-600 dark:text-gray-400 mb-6">Your password has been changed successfully.</p>
        <a href="{% url 'profile' %}" class="inline-block bg-teal-600 hover:bg-teal-700 text-white font-medium py-3 px-6 rounded-lg transition duration-200">
            Back to Profile
        </a>
    </div>
</div>
{% endblock %}
